name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fmc_db
          POSTGRES_USER: fmc_user
          POSTGRES_PASSWORD: fmc_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: fmc_db
      POSTGRES_USER: fmc_user
      POSTGRES_PASSWORD: fmc_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest
